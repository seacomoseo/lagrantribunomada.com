      key: ES
    - label: 🇵🇹 Portugal
      key: PT
    - label: 🇫🇷 Francia
      key: FR
  - type: geo
    name: Posición
    color: alt
    req: y
    show_if: Proyecto&&Mapa
  - type: h3
    label: Multimedia
    show_if: Proyecto
  - type: file
    name: Logo
    hint: Adjunta tu logo (preferible en formato PNG con fondo transparente)
    accept: image/*
    show_if: Proyecto
    base_name: Nombre Proyecto
  - type: file
    name: Imágenes
    hint: Adjunta un máximo de 3 imágenes representativas (MUY recomendable)
    accept: image/*
    max: 3
    show_if: Proyecto
    base_name: Nombre Proyecto
  - type: text
    name: Vídeo
    hint: Indica el enlace relevante de un vídeo de Youtube o Vimeo
    full: y
    show_if: Proyecto
  - type: h3
    label: Otros
    show_if: Proyecto
  - type: check
    name: Encuentros
    label: Ofrezco mis dones y/o espacio para vuestros encuentros
    full: y
  - type: area
    name: Encuentros Descripción
