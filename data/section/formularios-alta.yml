    full: y
    show_if: Proyecto
  - type: text
    name: Email
    full: y
    show_if: Proyecto
  - type: phone
    name: Teléfono
    show_if: Proyecto
  - type: phone
    name: WhatsApp
    show_if: Proyecto
  - type: text
    name: Web
