    show_if: Proyecto
  - type: h3
    label: Ubicación
    show_if: Proyecto
  - type: check
    name: Mapa
    label: Quiero aparecer en el mapa interactivo
    full: y
    show_if: Proyecto
  - type: text
    name: Calle
    show_if: Proyecto&&Mapa
  - type: text
    name: Número
    show_if: Proyecto&&Mapa
  - type: text
    name: Puerta
    show_if: Proyecto&&Mapa
  - type: text
    name: CP
