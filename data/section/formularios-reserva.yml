name: Formularios ➡️ Reserva
if: booking.active
node: div
pt: 0
size: sm
boxes:
- hanchor: Reserva
  form:
    action: https://script.google.com/macros/s/AKfycbwnercDPcKAv4JoNlhYus0imXcbvyysjRPW6XSIosKSrG3ah_33nQTQWTnoXcl2vkiN/exec
    mail: lorensansol@gmail.com
    to: '#reserva-enviada'
  get:
  - from: booking.inputs
    to: inputs
modal:
  icon_pos: top
modals:
- if: booking
  id: reserva-enviada
  hanchor: Reserva Enviada
  title: Importante
  md: |
    El formulario de reserva para **{{% get icon %}} {{% get title %}}** se ha enviado correctamente.

    Te escribiremos para darte indicaciones sobre la aportación y te agregaremos al grupo de WhatsApp del encuentro.

    Si las plazas ya están cubiertas, entrarás en lista de espera y te avisaremos si se libera alguna.

    ¡Muchas gracias!
  size: xs
  align: center
