- title: Grupos
  md: |
    Toca en cada uno para ver su información

    [[::🩵:: Amorígenes]](#grupo-amorigenes "[alt sm]")
    [[::🪄:: Anuncios]](#grupo-anuncios "[alt sm]")
    [[::⏳:: Agenda]](#grupo-agenda "[alt sm]")
    [[::⛺:: Tribnb]](#grupo-tribnb "[alt sm]")
    [[::🗣️:: Gran Foro Tribal]](#grupo-gran-foro-tribal "[alt sm]")
