- icon: search
  title: ¿Qué Buscamos?
  size: lg
  md: |
    Personas cuyo estilo de vida se dirige hacia la soberanía, la libertad y el disfrute de la vida en red:
  align: center
  box:
    cols: 3
  boxes:
  - icon: barefoot
    title: Nómades
    md: |
      Estilo de vida nómada permanente o intermitente.

      Si tu intención es iniciarte en este estilo de vida o tienes curiosidad, súmate, en tribu es más sencillo.
  - icon: crowdsource
    title: Comunidades
    md: |
      Espacios de convivencia, voluntariado y creación en los que la motivación sea caminar en tribu, lograr autonomía, contacto con la naturaleza, restaurar espacios con potencial…
  - icon: person_play
    title: Freelancer
    md: |
      Emprendedores, artistas, personas que quieren desarrollar su potencial y su economía de manera independiente.

      Si estás planteándote este camino, estás empezando o te encuentras en el proceso de descubrir tus dones, también este es tu espacio.
- icon: diversity_2
  title: ¿Qué Ofrecemos?
  md: |
    #### Si no eres soci@
    pero estás dentro de la comunidad/redes

    - Acceso a contactos con motivaciones afines a las tuyas con los que realizar intercambios, compartir viajes, cocrear proyectos, solicitar u ofrecer voluntariado, lugar para pernoctar…
    - Acceso al grupo de WhatsApp “Servicios” ::auto_fix_high::, donde promocionarte y conocer a otr@s freelancers.
    - Acceso a información relevante como el directorio de comunidades, servicios, amorígenes, espacios con ventajas para organizar eventos…
    - Acceso al seguimiento de nuestro proyecto, con la puerta abierta si quieres sumarte a nuestro nomadismo ::favorite::

    #### Si eres soci@
    - Dispondrás de un espacio de promoción dentro de la plataforma web de tu proyecto personal o comunitario, difusión en nuestras redes sociales de tus eventos y estarás ubicado do en nuestro directorio.
    - Contarás con el sostén del equipo de coordinación que tendrá en cuenta tus propuestas y necesidades. Tendrás voz en el proyecto LGTN.
    - También, abrimos la opción de cocrear contigo tu evento, taller o retiro (la logística, el espacio, la programación, la coordinación de l@s asistentes, el encuentro, la alimentación…). Consulta con nosotr@s las condiciones de este servicio.
    - Ventajas en los servicios entre soci@s ::lightbulb::

    #### Si sois una comunidad
    - Nuestra intención es visitar vuestro espacio y conocer vuestro proyecto, reunir información a través de la convivencia y de una entrevista diseñada para recoger información de interés para el público. También acudimos como voluntari@s y con el foco de nutrir y dejarnos nutrir por vosotr@s ::eco::
- icon: login
  title: ¿Cómo Entrar?
  md: |
    ¡Convirtiéndote en **Amorígen**!

    Puedes solicitar estar dentro de la **COMUNIDAD** de WhatsApp de **LGTN**.

    [[::brand:whatsapp:: Comunidad de WhatsApp]](https://chat.whatsapp.com/DPbPJBRTk8pChDJBJP6q22 "[nofollow whatsapp]")
    [[Info de cada grupo]](/whatsapp/)

    También puedes seguir nuestra trayectoria y apoyarnos en redes sociales ([Instagram](https://www.instagram.com/lagrantribunomada/ "[nofollow]") y [Telegram](https://t.me/lagrantribunomada "[nofollow]")).

    Una vez estés dentro de la comunidad de WhatsApp, podrás sumarte en ruta a la [caravana viva](/#caravana-amorigen) y viajar con nosotr@s.

    Si quieres ser soci@, puedes formar parte de nuestra **ASOCIACIÓN**:

    [[Hazte Soci@]](/alta/ "[alt]")

    Al entrar en la asociación, además de apoyar el proyecto ::favorite::, tendrás acceso a las ventajas de soci@ que te explicamos en el[ apartado “Qué ofrecemos”](/#que-ofrecemos).

    Y por supuesto, si te apetece **COLABORAR** con nuestro proyecto a través de [donaciones](/#donaciones) económicas o de cualquier otro tipo, toda ayuda es bienvenida y agradecida desde el corazón.

    Por último, si crees que tus dones pueden ser necesarios dentro del Equipo de Coordinación y quieres trabajar con nosotros en la creación y desarrollo del proyecto, [coméntanos](/#contacto) tu propuesta para que la valoremos.
- icon: rv_hookup
  title: Caravana Amorigen
  md: |
    🌬️ Si quieres vivir la experiencia de la primera caravana amorígen, únete y compartiremos la cocreación de esta maravillosa red itinerante 😍

    #### 🎯 ¿Cuál es el objetivo?
    - Visitar **espacios, proyectos, comunidades** y colaborar en sus necesidades.
    - Hacer crecer la **red**, la familia 🤍
    - Compartir un viaje comunitario en **Tribu**.
    - Fomentar y crear una **economía sostenible y circular** a través de nuestros dones mientras viajamos.

    #### 🫂 ¿Cómo nos relacionamos?
    - Con las **personas**, desde el amor, el respeto y la consciencia.
    - Con **nuestro cuerpo**, como un templo, cuidando nuestra alimentación y sacándolo a bailar.
    - Con el **entorno**, cuidando la naturaleza, dejándolo todo mejor de lo que estaba.

    ### 🚐 ¿Cómo viajamos?
    - En **furgo**, **caravana** o cualquier **vehículo** que te permita dormir en él.
    - Compartiendo vehículo, siempre es mejor.

    #### 📍 Punto de partida
    Comenzó al finalizar el encuentro de [MABON](/evento/2024/09/20/mabon/) (23 de septiembre de 2024), en el espacio "**Cami Iyasareru**" (Valencia).

    Finalizaremos la caravana en el próximo evento a finales de Octubre, en SAMHAIN 🧙🏼‍♀️

    #### 📝 ¿Cómo unirte?
    Ponte en contacto con nosotres y te informamos.

    #### 📲 Contacto
    [[::brand:whatsapp:: Xemi → 665 56 19 23]](https://wa.me/34665561923 "[nofollow whatsapp]")

    Puedes unirte a la caravana en cualquier momento del viaje sin importar la fecha de salida de la caravana amorígen 😉
- icon: adjust
  title: Pangea
  md: |
    Así se llamaba a casi toda la capa terrestre del planeta que estaba unificada en una sola. Hace 175 millones de años, comenzó a fracturarse y a convertirse en los continentes que conocemos hoy día.

    Tal como la tierra se dividió, fuimos diviéndonos los humanos en territorios, códigos y culturas distintas. 

    Gracias a ello, ahora somos infinitamente diversos. Y en LGTN, creemos en la riqueza que sucede cuando, después de construir nuestra individualidad, volvemos a unirnos. 

    En la actualidad, hay más de doscientos proyectos comunitarios en España. Muchas personas han adquirido una tierra y la habitan a su modo, anhelando compartirla. 

    Cada proyecto es una proyección de quien lo crea. Cada comunidad, es un mundo. Hay de todo tipo, formando un amplio y diverso universo en el que, probablemente, haya lugar para todos. 

    Desde LGTN, queremos unificar las fuerzas de estos proyectos y poner en contacto a las personas que los anfitrionan y aguardianan para que puedan apoyarse y aprender unas de otras, colaborando, inspirándose y nutriéndose con la sabiduría que albergan.

    Asimismo, dentro de este proyecto "Pangea", haremos una recaudación de información de estos proyectos/comunidades a través de entrevistas, con el fin de ofrecer datos de interés para aquellas personas que quieran conocer este estilo de vida o directamente colaborar o convivir en estos espacios.

    #### ¿Anfitrionas un espacio abierto a comunidad o voluntariado?
    - ::👣:: Pincha aquí:

    [[::brand:telegram:: Grupo de anfitriones]](https://t.me/+yFjBSvzQ2xsxMjlk "[nofollow alt]")
    [[::brand:whatsapp:: Indira → 623 58 84 19]](https://wa.me/34623588419 "[nofollow whatsapp]")

    #### ¿Cuál es la finalidad de este grupo de Telegram?

    - ::✨:: Crear una red de anfitriones de proyectos/comunidades (que se unan).
    - ::✨:: Acercar a les anfitriones para crear red social entre elles (que se conozcan).
    - ::✨:: Potenciar la ayuda y el apoyo que pueden prestarse entre sí (que colaboren).
    - ::✨:: Unificar conocimientos a través de reuniones de zoom mensuales donde en cada ocasión sea una persona la que ofrece información de interés a la comunidad (que se nutran).
    - ::✨:: Visibilizar este estilo de vida, así como vuestros proyectos y ofertas de voluntariado (que se den a conocer al resto de comunidad).

    #### ¿Cómo materializar estos objetivos?

    - ::➡️:: [Date de alta](/alta/) en el mapa de la web.
    - ::➡️:: Solicita una entrevista con el equipo de LGTN para hablar de tu proyecto.
    - ::➡️:: Publica tus ofertas de voluntariado en el [grupo de voluntarios](https://t.me/+sn92Pl2y1cgwMzdk).
    - ::➡️:: También puedes publicitar tus actividades en el [grupo “agenda” de la comunidad WhatsApp](https://chat.whatsapp.com/JddRsib2DYQKtS50a9IEjZ).
    - ::➡️:: Acudir a las reuniones mensuales de la red de anfitriones que progamaremos vía zoom.

    Gracias por unirte y hacer crecer tu proyecto, el nuestro y la comunidad que somos y cocreamos 👣❤️
